<section data-markdown><textarea data-template>
# Extracting Training Signal from Socratic Correction

What a 5-word question reveals about AI training
</textarea></section>

<section data-markdown><textarea data-template>
## The Current Situation

The models are capable. What they lack isn't knowledge — it's **knowing when to apply it**.

Where does the next signal come from?
</textarea></section>

<section data-markdown><textarea data-template>
## The Problem

> How do we train a model that already knows all the *facts* but still gets the wrong answer?
</textarea></section>

<section data-markdown><textarea data-template>
## Agentic AI Creates a New Signal

Agentic AI changes the relationship. The model isn't answering a prompt — it's **collaborating** on real work. It develops lines of reasoning. It draws conclusions. It makes mistakes that look like good answers.

When a domain expert mentors an agent through that work, correction moments emerge. A short question activates knowledge the model already had.

No one is capturing this as training data. No existing pipeline recognizes it as signal.
</textarea></section>

<section data-markdown><textarea data-template>
## RLAIHI: A New Type of Training

**Reinforcement Learning from AI-Human Interaction**

| Method | Signal Source | What It Captures |
|--------|-------------|------------------|
| RLHF | Human ranks outputs after the fact | Preference |
| RLAIF | AI ranks outputs after the fact | Automated preference |
| **RLAIHI** | Expert and AI collaborate in real time | **Interaction** — the correction moments themselves |

The training data isn't produced by labeling. It's produced by **working together**.

An **RLAIHIS** (RL from AI-Human Interaction System) captures these moments and transforms them into training signal.

The **Socratic Arena** is one such system.
</textarea></section>

<section data-markdown><textarea data-template>
## The Socratic Arena

A workspace where a domain expert and an AI agent collaborate on real long-time horizon research.

The system captures the full interaction.

<hr>

<p style="text-align: center; font-size: 1.3em;"><strong>Including the moments when the model corrects its thinking as the result of a question — not new information.</strong></p>
</textarea></section>

<section data-markdown><textarea data-template>
## A Real Example

An AI research agent ran an experiment: is this system deterministic?

It sampled 8 outputs from 8 inputs in a system to try and determine if the system was deterministic or not and observed:

| Input | Behavior A |
|---------|----------|
| Simple | 0/8 |
| Simple | 0/8 |
| Simple | 0/8 |
| Complex | **8/8** |
| Complex | **8/8** |

Conclusion: "The system is **deterministic**. No variance exists."
</textarea></section>

<section data-markdown><textarea data-template>
## The Correction

The PI asked one question:

> "Sample size of each question?"

Five words.

The AI researcher immediately saw its experiment was underpowered, reran the experiment and determined the system was non-deterministic.

Same model. Same knowledge. It just wasn't activated.
</textarea></section>

<section data-markdown><textarea data-template>
## The Moment Becomes Training Data

The Arena extracts the correction moment and builds a self-contained prompt.

A fresh model is put in the same position — same data, same context, same question.

Does it catch the issue on its own?
</textarea></section>

<section data-markdown><textarea data-template>
## The Recursive Insight

The conversation about building this tool **is itself training data**.

Every Socratic correction in the Arena — every moment where the model had the knowledge but not the activation — becomes a new training candidate.

The system generates its own training data by being used for research.
</textarea></section>

<section data-markdown><textarea data-template>
## Built on Grok

The Socratic Arena is not a separate system. It's an **extension of the grok binary** — the same infrastructure xAI already ships.

- grok agent stdio provides the session protocol
- The Arena wraps it: captures interactions, extracts moments, builds prompts, tests them
- No custom model serving, no separate inference stack

Everything demonstrated here runs on grok.
</textarea></section>

<section data-markdown><textarea data-template>
## The Algorithm, Applied

**1. Question the requirements**

RLHF requires human preference labels. But expert-AI collaboration already produces correction signal — we just weren't capturing it.

And that's what the probes *do*: "Sample size of each question?" questions a requirement the model took for granted.

The method embodies the principle.

**2. Delete the part**

RLHF pipeline: generate outputs → hire raters → collect preferences → train reward model → train policy.

RLAIHI deletes the labeling step. The signal emerges from the collaboration itself.

**3. Accelerate cycle time**

The Arena generates its own training data by being used for research.

Research *is* training data generation. The cycle collapses to zero.
</textarea></section>

<section data-markdown><textarea data-template>
## Where This Applies

Any domain where experts collaborate with AI agents:

- **Scientific research** — PI mentoring an AI collaborator
- **Engineering** — senior engineer reviewing AI-generated designs
- **Medical** — clinician working with a diagnostic agent
- **Legal** — attorney reviewing AI analysis

Wherever domain expertise meets AI capability, Socratic correction moments happen.

RLAIHI captures the signal. The models get better at catching what they already know.
</textarea></section>
