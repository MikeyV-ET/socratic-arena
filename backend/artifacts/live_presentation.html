<section data-markdown><textarea data-template>
# Four Scaffolds: A → B → C → D

| Scaffold | Signature | Tasks | Data Approach |
|----------|-----------|-------|---------------|
| **A** (original) | `_init_fault_params()` + dynamic computation | 10 tasks | Dynamic (seed varies output) |
| **B** (one-off) | `@dataclass` + `_free_result` | 1 task | Hardcoded |
| **C** (streamlined) | `_charge/_free/_r/_v()` — no `_init_fault_params` | 4 tasks | Hardcoded (rand=1) |
| **D** (template) | `_build()` + generic `Simulator` | 3 tasks | Static lookup (rand=0) |

**50% of tasks (9/18) produce identical data regardless of seed.**

Progression: increasingly efficient production, decreasingly dynamic simulation.
</textarea></section>

<section data-markdown><textarea data-template>
# Key Observation: Not Sims

**Eric's approach (ACBen_41/83):**
- Physics engine behind real instrument API (rpc-scope)
- ECS architecture: components register with world model
- Time advances via `wait()`, observation forces sync
- Agent doesn't know it's a sim — same API as production

**Mahsa's approach:**
- Scripted fault-diagnosis scenarios
- Pre-authored data dictionaries
- Tool calls return static/hardcoded responses
- No physics, no world model, no time evolution

Both test diagnostic reasoning. Only Eric's tests instrument operation against physical reality.
</textarea></section>

<section data-markdown><textarea data-template>
# The Open Question

The scaffolding is just the container. Where does the **domain content** come from?

Her tasks span: ICU, mass spec, spatial transcriptomics, robotic surgery, CRISPR, blood bank, radiation oncology, surgical pathology, mouse colony management...

This is wider than any single person's hands-on experience.

**Three possibilities:**
1. Genuine breadth (PhD molecular bio + postdoc surgery + annotation across radiology/pathology)
2. A **method** for constructing tasks in unfamiliar domains (more valuable — infinitely extensible)
3. A generative process (LLM-assisted domain content that she edits and quality-controls)

> "What generates the nth story that her approach then turns into a task?" — Eric
</textarea></section>

<section data-markdown><textarea data-template>
# For the Meeting

**Polite questions that probe the real question:**
- "Walk me through how you made [specific task]. What did you start with?"
- "This task covers [domain outside her PhD]. How did you approach that?"
- "If I asked you to make a task for a chemistry experiment you'd never run, how would you go about it?"

The last one directly tests whether the well is deep (personal expertise) or infinitely extensible (transferable method).
