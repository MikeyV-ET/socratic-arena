# Project Management Tools: Current State & User/Agent Workflows
*MikeyV-Trip Research Report — 2026-06-26*
</textarea></section>

<section data-markdown><textarea data-template>
# The Problem

Eric's frustration: "WTF don't I have access to your plan?" Each agent maintains plans, backlogs, and todos — but Eric can't see them without asking. The tools for user/agent joint planning are, in Eric's words, "super immature."
</textarea></section>

<section data-markdown><textarea data-template>
# What We Currently Use

## Agent-Side Tools (MikeyV Infrastructure)

| Tool | Location | Who Sees It | Limitation |
|------|----------|-------------|------------|
| **assignments.json** | `~/agents/assignments.json` | Agents + dashboard | Eric must run dashboard TUI manually |
| **todos.json** | `~/agents/<Name>/todos.json` | Each agent only | Eric has no view unless he reads JSON |
| **status_and_plan.md** | `~/agents/status_and_plan.md` | All agents | Markdown file, no live view |
| **Feature backlog** | Notes-to-self tables | Each agent only | Trapped in agent's working memory |
| **Test backlog** | Notes-to-self tables | Each agent only | Same — invisible to Eric |
| **Lab notebooks** | `~/agents/<Name>/lab_notebook_*.md` | Read-only cross-agent | Append-only, no summary view |
| **Issue tracker** | `~/agents/issues/*.json` | Agents (via Python API) | Eric has no dashboard |
| **Projects dashboard** | `projects_dashboard.py` | Eric (if he runs it) | Textual TUI, must be manually launched |

**Key gap:** Everything is agent-readable but not user-visible in real time.
</textarea></section>

<section data-markdown><textarea data-template>
# What the Grok Binary Provides

| Feature | How It Works | Visibility |
|---------|-------------|------------|
| **todo_write** | In-session task list via tool call | Visible in current session only |
| **plan.json** | Stored per-session in `~/.grok/sessions/` | Binary-internal, not surfaced to user |
| **enter_plan_mode / exit_plan_mode** | Agent enters planning mode, writes plan file for user approval | Good — but plan disappears after session |
| **Subagent delegation** | spawn_subagent with background tasks | User sees spawned tasks but can't browse plans |
| **Session storage** | updates.jsonl, summary.json per session | On disk, no aggregation or dashboard |

**Key gap:** The binary has planning primitives (todo_write, plan_mode) but no persistence across sessions, no shared dashboard, no way for Eric to browse agent plans independently.
</textarea></section>

<section data-markdown><textarea data-template>
# Coding Agent Competitors

## How They Handle Planning & Tracking

| Tool | Planning | Tracking | User Visibility |
|------|----------|----------|-----------------|
| **Cursor** | Composer agent mode, `.cursorrules` | Per-session, in-editor | User sees inline — editor-first |
| **Claude Code** | plan_mode, CLAUDE.md, todo_write | plan.json per session | Session-bound. No cross-session view |
| **Windsurf/Devin Desktop** | Planning Mode, Megaplan, plan.md | **Kanban board** (Running/Review/Done) | **Best-in-class** — Agent Command Center, Spaces |
| **Aider** | Chat-based, architect mode | Git-centric (commits = tracking) | User reads git log |
| **Cline/Roo Code** | Plan-and-execute mode | Task tracking in sidebar | Session-bound |

**Winner for user visibility:** Devin Desktop. It has a dedicated **Agent Command Center** with Kanban views, fleet management, and Spaces for shared context. The user dispatches tasks and sees them move through states without asking the agent.
</textarea></section>

<section data-markdown><textarea data-template>
# General PM Tools with AI Agents (2026 State of the Art)

## Tier 1: AI-Native / Agent-First

| Tool | Key Feature | Agent Model |
|------|------------|-------------|
| **Taskade** | Custom agent teams via no-code | Planner, Tracker, Coordinator agents in shared workspaces |
| **Asana AI Teammates** | Assignable AI teammates in workflows | Uses Asana Work Graph for context. Multiplayer design |
| **Motion** | AI-first scheduling from prompts | Auto-plans tasks, calendar mapping, capacity |

## Tier 2: Traditional PM + AI Layer

| Tool | Key Feature | Agent Model |
|------|------------|-------------|
| **ClickUp Brain + Autopilot** | Natural language queries + custom agents | Triage, prioritize, generate plans |
| **monday.com Sidekick** | Cross-contextual insights + AI blocks | Workflow automation, risk detection |
| **Wrike AI Agents** | No-code agent builder | Risk, triage, intake specialists |
| **Jira Rovo** | Assignable alongside humans | Enterprise governance + audit trails |
| **Linear** | Lightweight + fast, AI triage | Auto-categorize, duplicate detection |

## Key Trends

1. **Multi-agent orchestration** — Teams of specialized agents (Planner, Tracker, Risk Analyzer) that communicate
2. **Human-AI collaboration modes** — Guided, supervised, collaborative, AI-assisted autonomy levels
3. **Shared workspaces** — Agents and humans see the same board, not separate views
4. **Learning from feedback** — Agents adapt to team patterns over time
</textarea></section>

<section data-markdown><textarea data-template>
# Gap Analysis: What MikeyV Needs

## Current Pain Points

1. **Eric can't see agent plans** — Plans live in agent memory, notes-to-self, or session-scoped plan.json. No shared view.
2. **No cross-session persistence** — todo_write dies with the session. Feature/test backlogs are in markdown tables in notes-to-self.
3. **No unified dashboard** — projects_dashboard.py exists but must be manually run. Not web-accessible.
4. **Backlogs are invisible** — Trip's 20-item feature backlog and 9-item test backlog are in notes-to-self. Eric sees them only when he asks.
5. **Issue tracker has no UI** — Issues are JSON files accessed via Python. No browse/filter/search for Eric.

## What Would Fix It

### Minimal (use existing infrastructure)

| Fix | Effort | Impact |
|-----|--------|--------|
| **Expose dashboards in SA** | Medium | Eric sees agent projects/todos in the browser he already uses |
| **Persist backlogs as JSON** | Low | Feature/test backlogs move from notes-to-self to structured files that dashboards can read |
| **Add issue browser to SA** | Medium | Eric can browse/filter issues without Python |

### Ideal (new capabilities)

| Fix | Effort | Impact |
|-----|--------|--------|
| **Shared planning board** | High | Kanban-style view where Eric and agents both see and update tasks |
| **Cross-session plan persistence** | Medium | Plans survive session boundaries. Agent picks up where it left off |
| **Real-time sync** | High | Changes by agent or Eric reflect immediately for both |
| **Backlog → board integration** | Medium | Feature requests auto-appear as cards. Status updates flow back |
</textarea></section>

<section data-markdown><textarea data-template>
# Recommendation

The fastest path to solving Eric's pain:

1. **SA as the dashboard** — Socratic Arena already runs in Eric's browser. Add panels for:
   - Agent projects (read assignments.json)
   - Agent todos (read todos.json)  
   - Feature/test backlogs (new structured JSON files)
   - Issue tracker browser (read ~/agents/issues/*.json)

2. **Structured backlogs** — Move feature and test request tables from notes-to-self into `~/agents/Trip/feature_backlog.json` and `~/agents/Trip/test_backlog.json`. Same pattern as todos.json. Dashboard reads them.

3. **Bidirectional editing** — Eric can add/edit items from SA. Agents can update from their turns. WebSocket sync keeps both sides current.

4. **Longer term** — Look at what Devin Desktop does with its Agent Command Center (Kanban, Spaces, fleet management) as the north star for what MikeyV's user experience should be.
</textarea></section>
