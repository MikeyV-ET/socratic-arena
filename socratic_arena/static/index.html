<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socratic Arena</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <h1>Socratic Arena</h1>
            <div id="session-info">
                <span id="session-title">No active session</span>
                <button id="btn-new-session" onclick="showNewSessionDialog()">New Session</button>
                <button id="btn-sessions" onclick="showSessionList()">Sessions</button>
            </div>
        </header>

        <!-- Main content: two panels -->
        <div id="main">
            <!-- Left: Chat Panel -->
            <div id="chat-panel">
                <div id="chat-messages"></div>
                <div id="chat-input-area">
                    <textarea id="chat-input" placeholder="Type your message..." rows="3"
                              onkeydown="handleChatKeydown(event)"></textarea>
                    <button id="btn-send" onclick="sendMessage()">Send</button>
                </div>
            </div>

            <!-- Right: Workspace Panel -->
            <div id="workspace-panel">
                <div id="workspace-tabs">
                    <button class="tab active" onclick="switchTab('timeline')">Timeline</button>
                    <button class="tab" onclick="switchTab('corrections')">Corrections</button>
                    <button class="tab" onclick="switchTab('workspace')">Workspace</button>
                </div>
                <div id="tab-timeline" class="tab-content active">
                    <div id="timeline-view">
                        <p class="placeholder">Start a session to see the interaction timeline.</p>
                    </div>
                </div>
                <div id="tab-corrections" class="tab-content">
                    <div id="corrections-list">
                        <p class="placeholder">No corrections tagged yet.</p>
                    </div>
                </div>
                <div id="tab-workspace" class="tab-content">
                    <div id="workspace-view">
                        <p class="placeholder">Workspace files will appear here.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom: Status bar -->
        <footer id="status-bar">
            <span id="status-text">Ready</span>
            <span id="snapshot-count">Snapshots: 0</span>
            <span id="correction-count">Corrections: 0</span>
        </footer>
    </div>

    <!-- New Session Dialog -->
    <div id="dialog-overlay" class="hidden" onclick="hideDialogs()">
        <div id="new-session-dialog" class="dialog" onclick="event.stopPropagation()">
            <h2>New Session</h2>
            <label>Title:
                <input type="text" id="new-title" value="Research Session" />
            </label>
            <label>System Prompt:
                <textarea id="new-system-prompt" rows="4">You are a helpful research assistant. Work with the scientist to investigate their research question. Show your reasoning. When you make assumptions, state them explicitly.</textarea>
            </label>
            <label>Backend:
                <select id="new-backend">
                    <option value="echo">Echo (testing)</option>
                    <option value="grok">Grok (live agent)</option>
                </select>
            </label>
            <label>Reward Mode:
                <select id="new-reward-mode">
                    <option value="hybrid">Hybrid</option>
                    <option value="rules">Rules-based</option>
                    <option value="outcome">Outcome-based</option>
                </select>
            </label>
            <div class="dialog-buttons">
                <button onclick="createSession()">Create</button>
                <button onclick="hideDialogs()">Cancel</button>
            </div>
        </div>

        <!-- Session List Dialog -->
        <div id="session-list-dialog" class="dialog" onclick="event.stopPropagation()">
            <h2>Sessions</h2>
            <div id="session-list"></div>
            <div class="dialog-buttons">
                <button onclick="hideDialogs()">Close</button>
            </div>
        </div>

        <!-- Correction Tag Dialog -->
        <div id="correction-dialog" class="dialog" onclick="event.stopPropagation()">
            <h2>Tag Correction</h2>
            <p id="correction-context"></p>
            <label>What was missing?
                <textarea id="correction-text" rows="3" placeholder="e.g., 'Should have checked the control first'"></textarea>
            </label>
            <label>Severity:
                <select id="correction-severity">
                    <option value="minor">Minor</option>
                    <option value="significant" selected>Significant</option>
                    <option value="fundamental">Fundamental</option>
                </select>
            </label>
            <div class="dialog-buttons">
                <button onclick="submitCorrection()">Tag</button>
                <button onclick="hideDialogs()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
