<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session - Socratic Arena</title>
<style>
  :root {
    --bg: #1a1b26; --surface: #24283b; --surface2: #2f3447;
    --text: #c0caf5; --text-dim: #565f89; --accent: #7aa2f7;
    --green: #9ece6a; --yellow: #e0af68; --red: #f7768e;
    --border: #3b4261; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { display: flex; align-items: center; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 16px; flex-shrink: 0; }
  .header a { color: var(--text-dim); text-decoration: none; font-size: 1.2rem; }
  .header h2 { font-size: 1.1rem; flex: 1; }
  .header .status { font-size: 0.8rem; color: var(--green); }
  .header .stats { font-size: 0.8rem; color: var(--text-dim); }

  /* Main layout */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* Chat panel (left) */
  .chat-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; }
  .msg { margin-bottom: 12px; position: relative; padding: 10px 14px; border-radius: var(--radius); max-width: 85%; word-wrap: break-word; }
  .msg-mentor { background: var(--surface); margin-right: auto; border-left: 3px solid var(--accent); }
  .msg-agent { background: var(--surface2); margin-left: auto; border-right: 3px solid var(--green); }
  .msg-system { background: transparent; color: var(--text-dim); font-size: 0.85rem; text-align: center; max-width: 100%; border: none; }
  .msg-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .msg-content { white-space: pre-wrap; line-height: 1.5; }
  .msg-time { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }
  .msg-actions { position: absolute; top: 6px; right: 6px; opacity: 0; transition: opacity 0.15s; }
  .msg:hover .msg-actions { opacity: 1; }
  .msg-actions button { background: var(--yellow); color: var(--bg); border: none; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; cursor: pointer; font-weight: 600; }
  .msg.has-correction { border-left-color: var(--yellow); }
  .msg .correction-badge { display: inline-block; background: var(--yellow); color: var(--bg); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-top: 6px; }

  /* Input area */
  .input-area { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
  .input-area select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; font-size: 0.9rem; }
  .input-area textarea { flex: 1; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 0.95rem; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 120px; }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area button { background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius); padding: 10px 20px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* Timeline panel (right) */
  .timeline-panel { width: 280px; background: var(--surface); overflow-y: auto; padding: 16px; flex-shrink: 0; }
  .timeline-panel h3 { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .tl-item { padding: 8px 10px; border-left: 2px solid var(--border); margin-bottom: 4px; font-size: 0.8rem; cursor: pointer; }
  .tl-item:hover { background: var(--surface2); }
  .tl-item.tl-correction { border-left-color: var(--yellow); }
  .tl-item .tl-role { color: var(--text-dim); text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px; }
  .tl-item .tl-preview { color: var(--text); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tl-item .tl-tag { color: var(--yellow); font-size: 0.7rem; margin-top: 2px; }

  /* Correction modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 400px; max-width: 90vw; }
  .modal h3 { margin-bottom: 16px; }
  .modal input, .modal select { width: 100%; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.95rem; margin-bottom: 12px; outline: none; }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal .btn-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 16px; cursor: pointer; }

  /* Export button */
  .btn-export { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 12px; font-size: 0.8rem; cursor: pointer; }
  .btn-export:hover { border-color: var(--accent); }

  @media (max-width: 768px) {
    .timeline-panel { display: none; }
  }
</style>
</head>
<body>
<div class="header">
  <a href="/">&larr;</a>
  <h2 id="session-name">Loading...</h2>
  <span class="stats" id="stats"></span>
  <span class="status" id="ws-status">connecting...</span>
  <button class="btn-export" onclick="exportSession()">Export</button>
</div>

<div class="workspace">
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <select id="role-select">
        <option value="mentor">Mentor</option>
        <option value="agent">Agent</option>
      </select>
      <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="timeline-panel">
    <h3>Timeline</h3>
    <div id="timeline"></div>
  </div>
</div>

<!-- Correction modal -->
<div class="modal-overlay" id="correction-modal">
  <div class="modal">
    <h3>Tag Correction</h3>
    <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px;">What operating constraint was missing?</p>
    <input type="text" id="correction-constraint" placeholder='e.g., "Run the control first"'>
    <input type="text" id="correction-category" placeholder="Category (optional)">
    <input type="hidden" id="correction-msg-idx">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="submitCorrection()" style="padding: 8px 16px; font-size: 0.9rem;">Tag</button>
    </div>
  </div>
</div>

<script>
const sessionId = window.location.pathname.split('/').pop();
const API = '/api';
let ws = null;
let session = null;
let corrections = {};  // message_index -> [correction]

function getSessionId() { return sessionId; }

function formatTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';

  session.messages.forEach((msg, idx) => {
    const div = document.createElement('div');
    const roleClass = msg.role === 'system' ? 'msg-system' : `msg-${msg.role}`;
    const hasCor = corrections[idx] ? 'has-correction' : '';
    div.className = `msg ${roleClass} ${hasCor}`;
    div.id = `msg-${idx}`;

    let html = '';
    if (msg.role !== 'system') {
      html += `<div class="msg-label">${msg.role}</div>`;
    }
    html += `<div class="msg-content">${escapeHtml(msg.content)}</div>`;
    html += `<div class="msg-time">${formatTime(msg.timestamp)}</div>`;

    if (msg.role !== 'system') {
      html += `<div class="msg-actions"><button onclick="openCorrectionModal(${idx})">Tag</button></div>`;
    }

    if (corrections[idx]) {
      corrections[idx].forEach(c => {
        html += `<div class="correction-badge">${escapeHtml(c.missing_constraint)}</div>`;
      });
    }

    div.innerHTML = html;
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
  updateStats();
  renderTimeline();
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  session.messages.forEach((msg, idx) => {
    if (msg.role === 'system') return;
    const hasCor = corrections[idx];
    const div = document.createElement('div');
    div.className = `tl-item ${hasCor ? 'tl-correction' : ''}`;
    div.onclick = () => document.getElementById(`msg-${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });

    let html = `<div class="tl-role">${msg.role} #${idx}</div>`;
    html += `<div class="tl-preview">${escapeHtml(msg.content.substring(0, 60))}</div>`;
    if (hasCor) {
      corrections[idx].forEach(c => {
        html += `<div class="tl-tag">${escapeHtml(c.missing_constraint)}</div>`;
      });
    }
    div.innerHTML = html;
    tl.appendChild(div);
  });
}

function updateStats() {
  const corCount = Object.values(corrections).flat().length;
  document.getElementById('stats').textContent =
    `${session.messages.length} messages | ${corCount} corrections`;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// WebSocket
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/${sessionId}`);

  ws.onopen = () => {
    document.getElementById('ws-status').textContent = 'live';
    document.getElementById('ws-status').style.color = 'var(--green)';
  };

  ws.onclose = () => {
    document.getElementById('ws-status').textContent = 'disconnected';
    document.getElementById('ws-status').style.color = 'var(--red)';
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'session_state') {
      session = data.session;
      document.getElementById('session-name').textContent = session.name;
      // Build correction index
      corrections = {};
      (session.corrections || []).forEach(c => {
        if (!corrections[c.message_index]) corrections[c.message_index] = [];
        corrections[c.message_index].push(c);
      });
      renderMessages();
    }

    else if (data.type === 'message') {
      session.messages.push(data.message);
      renderMessages();
    }

    else if (data.type === 'correction') {
      const c = data.correction;
      if (!corrections[c.message_index]) corrections[c.message_index] = [];
      corrections[c.message_index].push(c);
      session.corrections.push(c);
      renderMessages();
    }
  };
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const role = document.getElementById('role-select').value;
  const content = input.value.trim();
  if (!content || !ws) return;

  ws.send(JSON.stringify({
    action: 'send_message',
    role: role,
    content: content,
    msg_type: 'exchange',
  }));
  input.value = '';
  input.style.height = 'auto';
}

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Correction modal
function openCorrectionModal(msgIdx) {
  document.getElementById('correction-msg-idx').value = msgIdx;
  document.getElementById('correction-constraint').value = '';
  document.getElementById('correction-category').value = '';
  document.getElementById('correction-modal').classList.add('active');
  document.getElementById('correction-constraint').focus();
}

function closeModal() {
  document.getElementById('correction-modal').classList.remove('active');
}

function submitCorrection() {
  const msgIdx = parseInt(document.getElementById('correction-msg-idx').value);
  const constraint = document.getElementById('correction-constraint').value.trim();
  if (!constraint || !ws) return;
  const category = document.getElementById('correction-category').value.trim();

  ws.send(JSON.stringify({
    action: 'add_correction',
    message_index: msgIdx,
    missing_constraint: constraint,
    category: category,
  }));
  closeModal();
}

document.getElementById('correction-constraint').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitCorrection();
});

document.getElementById('correction-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('correction-modal')) closeModal();
});

// Export
async function exportSession() {
  const res = await fetch(`${API}/sessions/${sessionId}/export`);
  const data = await res.json();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `session_${sessionId}_export.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// Init
connectWS();
</script>
</body>
</html>
